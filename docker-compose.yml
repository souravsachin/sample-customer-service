version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sample-customer-db
    environment:
      POSTGRES_DB: sample_customer
      POSTGRES_USER: zorbit
      POSTGRES_PASSWORD: zorbit_dev
    ports:
      - '5440:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zorbit -d sample_customer']
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sample-customer-zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2191:2181'

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sample-customer-kafka
    depends_on:
      - zookeeper
    ports:
      - '9094:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

volumes:
  pgdata:
